        </header>

            <input

                autocomplete="off"
            >
            <div id="autocompleteMenu" class="absolute w-full mt-2 bg-white rounded-2xl shadow-2xl hidden max-h-[55vh] overflow-y-auto border border-slate-200"></div>
        </div>

        <div id="resultArea" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-t-8 border-blue-600">

                    </div>
                </div>
                <div id="genList" class="space-y-3"></div>
            </div>

        const searchInput = document.getElementById('mainSearch');
        const autocompleteMenu = document.getElementById('autocompleteMenu');
        const resultArea = document.getElementById('resultArea');
        const searchContainer = document.getElementById('searchContainer');
        const mainBody = document.getElementById('mainBody');

        let startY = 0;
        let isScrolling = false;

        // אלגוריתם מרחק עריכה - מאפשר לחפש עם שגיאות (כמו גוגל)
        function getLevenshteinDistance(s1, s2) {
            if (!s1 || !s2) return 99;
            const m = s1.length, n = s2.length;
            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
            for (let i = 0; i <= m; i++) dp[i][0] = i;
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    const cost = s1[i - 1] === s2[j - 1] ? 0 : 1;
                    dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
                }
            }
            return dp[m][n];
        }

        // נרמול טקסט עברי/אנגלי להשוואה נקייה
        function normalize(text) {
            return text.replace(/[^\u0590-\u05FFa-zA-Z0-9]/g, "").toLowerCase();
        }

        // סגירת מקלדת בזמן גלילה
        autocompleteMenu.addEventListener('scroll', () => {
            if (document.activeElement === searchInput) {
                searchInput.blur();
            }
        });

        // סגירת מקלדת בלחיצה בחוץ
        mainBody.addEventListener('click', (e) => {
            if (e.target !== searchInput && !autocompleteMenu.contains(e.target)) {
                searchInput.blur();
                autocompleteMenu.classList.add('hidden');
            }
        });

        searchInput.addEventListener('input', () => {
            const rawQuery = searchInput.value;
            const query = normalize(rawQuery);
            autocompleteMenu.innerHTML = "";
            
            if (query.length < 1) { 
                autocompleteMenu.classList.add('hidden'); 
                return; 
            }

            let matches = [];

            for (const [name, carObj] of Object.entries(CAR_DATA)) {
                const normName = normalize(name);
                const normBrand = normalize(carObj.brand);
                
                let bestScore = 100;
                
                // חיפוש מדויק תמיד מקבל עדיפות עליונה
                if (normName.includes(query) || normBrand.includes(query)) {
                    bestScore = 0;
                } else if (query.length >= 2) {
                    // חיפוש חכם - סלחני כלפי שגיאות הקלדה בשם החברה או הדגם
                    const brandDist = getLevenshteinDistance(query, normBrand.substring(0, query.length));
                    const nameDist = getLevenshteinDistance(query, normName.substring(0, query.length));
                    
                    if (brandDist <= 1) bestScore = Math.min(bestScore, brandDist);
                    if (nameDist <= 1) bestScore = Math.min(bestScore, nameDist);
                    
                    // בדיקת חלקי מילים למקרה של רכבים עם שם כפול (למשל ספורט, קרוס)
                    const words = name.toLowerCase().split(' ');
                    words.forEach(word => {
                        const normWord = normalize(word);
                        if (normWord && normWord.length >= query.length) {
                             const wordDist = getLevenshteinDistance(query, normWord.substring(0, query.length));
                             if (wordDist <= 1) bestScore = Math.min(bestScore, wordDist);
                        }
                    });
                }

                if (bestScore <= 1) {
                    matches.push({ name, brand: carObj.brand, score: bestScore });
                }
            }

            // מציג עד 30 תוצאות
            matches.sort((a, b) => a.score - b.score).slice(0, 30);

            if (matches.length > 0) {
                matches.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "p-5 border-b border-slate-50 car-item cursor-pointer hover:bg-blue-50 flex justify-between items-center";
                    div.innerHTML = `
                        <div class="text-right">
                            <div class="font-bold text-xl text-slate-800">${item.name}</div>
                            <div class="text-sm text-blue-500 font-bold uppercase tracking-wide">${item.brand}</div>
                        </div>
                    `;
                    
                    // מנגנון חכם: מזהה האם מדובר בגלילה או לחיצה במובייל
                    div.addEventListener('touchstart', (e) => {
                        startY = e.touches[0].pageY;
                        isScrolling = false;
                    }, { passive: true });

                    div.addEventListener('touchmove', (e) => {
                        // אם האצבע זזה יותר מ-10 פיקסלים - המשתמש גולל
                        if (Math.abs(e.touches[0].pageY - startY) > 10) {
                            isScrolling = true;
                        }
                    }, { passive: true });

                    div.addEventListener('touchend', (e) => {
                        if (!isScrolling) {
                            e.preventDefault();
                            showCar(item.name);
                        }
                    });

                    // למשתמשי עכבר/מחשב - לחיצה רגילה
                    div.addEventListener('mousedown', (e) => {
                        e.preventDefault(); 
                        showCar(item.name);
                    });
                    
                    autocompleteMenu.appendChild(div);
                });
                autocompleteMenu.classList.remove('hidden');
            } else {
                autocompleteMenu.classList.add('hidden');
            }
        });

        function showCar(name) {
            const car = CAR_DATA[name];
            document.getElementById('resTitle').textContent = name;
            document.getElementById('resBrand').textContent = car.brand;
            const list = document.getElementById('genList');
            list.innerHTML = "";
            
            car.gens.forEach(g => {
                const item = document.createElement('div');
                item.className = "bg-slate-50 p-6 rounded-3xl border border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-3";
                item.innerHTML = `
                    <div class="text-blue-600 font-black text-xl whitespace-nowrap">${g.y}</div>
                    <div class="text-slate-700 font-bold text-lg md:text-left">${g.d}</div>
                `;
                list.appendChild(item);
            });
            
            searchContainer.classList.add('hidden');
            resultArea.classList.remove('hidden');
            autocompleteMenu.classList.add('hidden');
            searchInput.blur();
        }

        document.getElementById('closeBtn').onclick = () => {
            resultArea.classList.add('hidden');
            searchContainer.classList.remove('hidden');
            searchInput.value = "";
            setTimeout(() => searchInput.focus(), 100);
        };
    </script>
</body>
</html>
