<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ידידים - איתור נפח מנוע לכונן</title>
    <style>
        /* --- הגדרות עיצוב (CSS) --- */
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --yedidim-blue: #004c8c;
            --yedidim-cyan: #479cd5;
            --yedidim-green: #88c057;
            --yedidim-magenta: #e05695;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px; /* מותאם לטלפון */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--yedidim-blue);
        }

        .header h1 {
            color: var(--yedidim-cyan);
            margin: 0 0 5px 0;
            font-size: 24px;
        }

        .header p { color: var(--text-muted); margin: 0; font-size: 14px; }

        /* אזור החיפוש */
        .search-container { position: relative; }
        
        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid var(--yedidim-blue);
            background-color: var(--card-bg);
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus { border-color: var(--yedidim-cyan); }

        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border: 1px solid var(--yedidim-blue);
            border-radius: 0 0 10px 10px;
            max-height: 200px;
            overflow-y: auto;
            margin: 0;
            padding: 0;
            list-style: none;
            z-index: 10;
        }

        .suggestions-list li {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestions-list li:hover { background-color: var(--yedidim-blue); }
        .suggestions-list li:last-child { border-bottom: none; }

        /* אזור התוצאות */
        .results-container { display: none; flex-direction: column; gap: 15px; }
        
        .results-title {
            color: var(--yedidim-green);
            font-size: 22px;
            margin: 0;
            text-align: center;
        }

        .data-card {
            background-color: var(--card-bg);
            border-right: 5px solid var(--yedidim-cyan);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .data-card.hybrid { border-right-color: var(--yedidim-green); }
        .data-card.petrol { border-right-color: var(--yedidim-magenta); }

        .card-year { font-weight: bold; font-size: 18px; color: var(--yedidim-cyan); margin-bottom: 8px; }
        .card-details { font-size: 16px; line-height: 1.5; }
        .card-details span { font-weight: bold; color: white; }

        .reset-btn {
            background-color: var(--yedidim-blue);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>ידידים - איתור מנוע</h1>
        <p>הכנס יצרן ודגם לקבלת נתוני רכב</p>
    </div>

    <div id="search-area" class="search-container">
        <input type="text" id="main-input" class="search-input" placeholder="התחל להקליד יצרן (למשל: טויוטה)..." autocomplete="off">
        <ul id="suggestions" class="suggestions-list hidden"></ul>
    </div>

    <div id="results-area" class="results-container">
        <h2 id="results-heading" class="results-title"></h2>
        <div id="cards-container"></div>
        <button id="reset-button" class="reset-btn">🔄 חיפוש רכב חדש</button>
    </div>
</div>

<script>
    /* --- מאגר הנתונים (Mock Database) --- */
    // כאן תוכל להוסיף עוד רכבים בדיוק באותו פורמט
    const carDatabase = {
        "טויוטה": {
            "קורולה": [
                { years: "2023 - 2024", volume: "1,800 סמ\"ק", fuel: "היברידי", hp: "140 כ\"ס", type: "hybrid" },
                { years: "2019 - 2022", volume: "1,800 סמ\"ק", fuel: "היברידי", hp: "122 כ\"ס", type: "hybrid" },
                { years: "2013 - 2018", volume: "1,600 סמ\"ק", fuel: "בנזין", hp: "132 כ\"ס", type: "petrol" }
            ],
            "יאריס": [
                { years: "2020 - 2024", volume: "1,500 סמ\"ק", fuel: "היברידי", hp: "116 כ\"ס", type: "hybrid" },
                { years: "2012 - 2019", volume: "1,300 סמ\"ק", fuel: "בנזין", hp: "99 כ\"ס", type: "petrol" }
            ]
        },
        "יונדאי": {
            "איוניק": [
                { years: "2017 - 2022", volume: "1,600 סמ\"ק", fuel: "היברידי", hp: "141 כ\"ס", type: "hybrid" }
            ],
            "טוסון": [
                { years: "2021 - 2024", volume: "1,600 סמ\"ק (טורבו)", fuel: "בנזין", hp: "180 כ\"ס", type: "petrol" },
                { years: "2016 - 2020", volume: "2,000 סמ\"ק", fuel: "בנזין", hp: "155 כ\"ס", type: "petrol" }
            ]
        },
        "קיה": {
            "פיקנטו": [
                { years: "2017 - 2024", volume: "1,200 סמ\"ק", fuel: "בנזין", hp: "84 כ\"ס", type: "petrol" },
                { years: "2011 - 2016", volume: "1,250 סמ\"ק", fuel: "בנזין", hp: "85 כ\"ס", type: "petrol" }
            ]
        }
    };

    /* --- לוגיקת האפליקציה (JavaScript) --- */
    const inputField = document.getElementById('main-input');
    const suggestionsList = document.getElementById('suggestions');
    const searchArea = document.getElementById('search-area');
    const resultsArea = document.getElementById('results-area');
    const resultsHeading = document.getElementById('results-heading');
    const cardsContainer = document.getElementById('cards-container');
    const resetButton = document.getElementById('reset-button');

    let currentStep = 'MAKER'; // MAKER or MODEL
    let selectedMaker = '';

    // מאזין להקלדה בשורת החיפוש
    inputField.addEventListener('input', function() {
        const query = this.value.trim().toLowerCase();
        suggestionsList.innerHTML = ''; // ניקוי הצעות קודמות
        
        if (query.length === 0) {
            suggestionsList.classList.add('hidden');
            return;
        }

        let options = [];
        if (currentStep === 'MAKER') {
            // חיפוש יצרנים
            options = Object.keys(carDatabase).filter(maker => maker.includes(query));
        } else if (currentStep === 'MODEL') {
            // חיפוש דגמים בתוך היצרן שנבחר
            options = Object.keys(carDatabase[selectedMaker]).filter(model => model.includes(query));
        }

        // הצגת ההצעות
        if (options.length > 0) {
            options.forEach(option => {
                const li = document.createElement('li');
                li.textContent = option;
                li.addEventListener('click', () => handleSelection(option));
                suggestionsList.appendChild(li);
            });
            suggestionsList.classList.remove('hidden');
        } else {
            suggestionsList.classList.add('hidden');
        }
    });

    // טיפול בבחירה מתוך הרשימה
    function handleSelection(selection) {
        if (currentStep === 'MAKER') {
            // נבחר יצרן
            selectedMaker = selection;
            currentStep = 'MODEL'; // מעבר לשלב הדגם
            inputField.value = ''; // מנקה את השורה כמו שביקשת
            inputField.placeholder = `בחר דגם של ${selectedMaker}...`;
            inputField.focus();
            suggestionsList.classList.add('hidden');
        } else if (currentStep === 'MODEL') {
            // נבחר דגם
            showResults(selectedMaker, selection);
        }
    }

    // הצגת התוצאות הסופיות
    function showResults(maker, model) {
        searchArea.classList.add('hidden'); // מסתיר את שורת החיפוש
        resultsArea.style.display = 'flex'; // מציג תוצאות
        resultsHeading.textContent = `תוצאות: ${maker} ${model}`;
        
        const carDataList = carDatabase[maker][model];
        cardsContainer.innerHTML = ''; // ניקוי כרטיסים קודמים

        // יצירת כרטיסייה לכל שנתון
        carDataList.forEach(data => {
            const card = document.createElement('div');
            // מוסיף קלאס לצבע לפי סוג דלק
            card.className = `data-card ${data.type === 'hybrid' ? 'hybrid' : 'petrol'}`;
            
            card.innerHTML = `
                <div class="card-year">שנתון: ${data.years}</div>
                <div class="card-details">
                    נפח מנוע: <span>${data.volume}</span><br>
                    סוג דלק: <span>${data.fuel}</span><br>
                    הספק: <span>${data.hp}</span>
                </div>
            `;
            cardsContainer.appendChild(card);
        });
    }

    // כפתור איפוס
    resetButton.addEventListener('click', () => {
        currentStep = 'MAKER';
        selectedMaker = '';
        inputField.value = '';
        inputField.placeholder = "התחל להקליד יצרן (למשל: טויוטה)...";
        searchArea.classList.remove('hidden');
        resultsArea.style.display = 'none';
        suggestionsList.classList.add('hidden');
        inputField.focus();
    });

    // סגירת רשימת הצעות בלחיצה מחוץ אליה
    document.addEventListener('click', (e) => {
        if (!searchArea.contains(e.target)) {
            suggestionsList.classList.add('hidden');
        }
    });
</script>

</body>
</html>
